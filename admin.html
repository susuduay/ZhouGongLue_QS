<script>

  theme: {
    extend: {
      colors: {
        'naruto-bg': '#0f0a05',

<style>
  /* 自定义滚动条 */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #2a1a0a;
  }
  ::-webkit-scrollbar-thumb {
    background: #c2410c;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #f97316;
  }

  /* 火影风格渐变文字 */
  .gradient-text {
    background: linear-gradient(135deg, #f97316, #fbbf24, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 忍者风格分隔线 */
  .ninja-divider {
    position: relative;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f97316, #fbbf24, #f97316, transparent);

    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 12px;
    height: 12px;
    background: #f97316;
    box-shadow: 0 0 10px rgba(249, 115, 22, 0.8);
  }

  /* 木叶标志 SVG 样式 */

  }

  .guide-content h1 { font-size: 1.75rem; }

  }

  }

  }

  .guide-content em,

  }

  .guide-content blockquote {

    background: rgba(249, 115, 22, 0.1);
    padding: 0.75rem 1rem;
    color: #fef3c7;
    border-radius: 0 0.5rem 0.5rem 0;
  }
  .guide-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    background: #1c1208;
  }
  .guide-content th,

    border: 1px solid #4a3015;
    padding: 0.5rem 0.75rem;

  }
  .guide-content th {
    background: #4a3015;
    color: #fbbf24;
    font-weight: bold;
  }
  .guide-content tr:nth-child(even) {
    background: rgba(74, 48, 21, 0.3);
  }
  .guide-content img {
    max-width: 100%;
    border-radius: 0.5rem;
    margin: 1rem 0;
    border: 1px solid #4a3015;
  }
  .guide-content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #4a3015, transparent);
    margin: 1.5rem 0;
  }
  .guide-content code {
    background: #2a1a0a;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;

    padding: 0;

  /* 卡片发光边框 */

    position: relative;
    border: 1px solid #4a3015;
    background: #1c1208;
  }
  .card-glow::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, #f97316, #fbbf24, #f97316);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;

    from { opacity: 0; transform: translate(-50%, -20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

    animation: slideDown 0.3s ease forwards;

<script>
(function() {
  'use strict';

  // ========== 数据存储 ==========
  const STORAGE_KEY = 'naruto_guides';
  const CURRENT_KEY = 'naruto_guides_current';

  function loadGuides() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) {
      console.error('加载攻略数据失败:', e);
      return [];
    }
  }

  function saveGuides(guides) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(guides));
      return true;
    } catch (e) {
      console.error('保存攻略数据失败:', e);
      showToast('保存失败，存储空间可能不足', 'error');
      return false;
    }
  }

  // ========== 导出 data.json ==========
  function exportDataJson() {
    const guides = loadGuides();
    const jsonStr = JSON.stringify(guides, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ========== 导入 data.json ==========
  function importDataJson(file) {
    if (!file) return;

    if (!file.name.endsWith('.json')) {
      showToast('请上传 .json 格式的文件', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);

        // 简单验证数据格式
        if (!Array.isArray(data)) {
          showToast('文件格式错误：数据应为数组', 'error');
          return;
        }

        // 验证每一项的基本字段
        const valid = data.every(item =>
          item && typeof item === 'object' &&
          'id' in item && 'title' in item &&
          'date' in item && 'content' in item
        );

        if (!valid) {
          showToast('文件格式错误：数据项缺少必要字段', 'error');
          return;
        }

        // 确认导入
        const currentCount = loadGuides().length;
        if (!confirm(`确定导入 ${data.length} 期攻略吗？\n当前本地有 ${currentCount} 期，导入后将被替换。`)) {
          return;
        }

        saveGuides(data);

        // 更新当前选中
        if (data.length > 0) {
          localStorage.setItem(CURRENT_KEY, data[data.length - 1].id);
        } else {
          localStorage.removeItem(CURRENT_KEY);
        }

        updateStatus();
        renderHistory();
        showToast(`成功导入 ${data.length} 期攻略`, 'success');
      } catch (err) {
        console.error('导入失败:', err);
        showToast('文件解析失败，请确认是有效的 JSON 文件', 'error');
      }
    };
    reader.onerror = function() {
      showToast('文件读取失败', 'error');
    };
    reader.readAsText(file);
  }

  // ========== DOM 元素 ==========
  const els = {
    latestIssue: document.getElementById('latestIssue'),
    totalIssues: document.getElementById('totalIssues'),
    lastUpdate: document.getElementById('lastUpdate'),
    titleInput: document.getElementById('titleInput'),
    dateInput: document.getElementById('dateInput'),
    dropZone: document.getElementById('dropZone'),
    fileInput: document.getElementById('fileInput'),
    fileName: document.getElementById('fileName'),
    fileNameText: document.getElementById('fileNameText'),
    previewSection: document.getElementById('previewSection'),
    previewContent: document.getElementById('previewContent'),
    publishBtn: document.getElementById('publishBtn'),
    resetBtn: document.getElementById('resetBtn'),
    exportBtn: document.getElementById('exportBtn'),
    importBtn: document.getElementById('importBtn'),
    importFileInput: document.getElementById('importFileInput'),
    clearAllBtn: document.getElementById('clearAllBtn'),
    historyList: document.getElementById('historyList'),
    historyEmpty: document.getElementById('historyEmpty'),
    toast: document.getElementById('toast'),
    toastContainer: document.getElementById('toastContainer'),
    toastMessage: document.getElementById('toastMessage'),
    toastIcon: document.getElementById('toastIcon'),
  };

  // ========== 当前状态 ==========
  let currentHtml = '';
  let currentFile = null;

  // ========== Toast 提示 ==========
  let toastTimer = null;
  function showToast(message, type = 'success', duration = 2500) {
    const container = els.toastContainer;
    const msg = els.toastMessage;
    const icon = els.toastIcon;
    
    msg.textContent = message;
    
    if (type === 'success') {
      container.className = 'px-5 py-3 rounded-lg shadow-naruto-glow-strong flex items-center gap-2 border bg-naruto-card border-naruto-gold text-naruto-gold';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
    } else if (type === 'error') {
      container.className = 'px-5 py-3 rounded-lg flex items-center gap-2 border bg-naruto-card border-naruto-red text-naruto-red';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
    } else {
      container.className = 'px-5 py-3 rounded-lg shadow-naruto-glow-strong flex items-center gap-2 border bg-naruto-card border-naruto-orange text-naruto-orange';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';
    }
    
    els.toast.classList.remove('hidden');
    els.toast.classList.add('toast-show');
    
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      els.toast.classList.add('hidden');
      els.toast.classList.remove('toast-show');
    }, duration);
  }

  // ========== 格式化日期 ==========
  function formatDate(dateStr) {
    if (!dateStr) return '--';
    const date = new Date(dateStr);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}年${month}月${day}日`;
  }

  // ========== 生成 ID ==========
  function generateId() {
    return 'issue-' + Date.now();
  }

  // ========== 获取今天日期字符串 ==========
  function getTodayStr() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  // ========== 更新状态区 ==========
  function updateStatus() {
    const guides = loadGuides();
    
    els.totalIssues.textContent = guides.length;
    
    if (guides.length > 0) {
      const latest = guides[guides.length - 1];
      els.latestIssue.textContent = latest.title || '未命名';
      els.lastUpdate.textContent = formatDate(latest.date);
    } else {
      els.latestIssue.textContent = '--';
      els.lastUpdate.textContent = '--';
    }
  }

  // ========== 渲染历史记录 ==========
  function renderHistory() {
    const guides = loadGuides();

    if (guides.length === 0) {
      els.historyList.innerHTML = '';
      els.historyEmpty.classList.remove('hidden');
      return;
    }

    els.historyEmpty.classList.add('hidden');

    // 倒序显示（最新在上面）
    const reversedGuides = [...guides].reverse();

    els.historyList.innerHTML = reversedGuides.map((guide, index) => {
      const realIndex = guides.length - 1 - index;
      return `
        <div class="history-item border border-naruto-border rounded-lg p-4 bg-naruto-muted/30">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="w-6 h-6 rounded-full bg-naruto-orange/20 border border-naruto-orange/40 flex items-center justify-center text-xs text-naruto-orange font-bold">
                  ${realIndex + 1}
                </span>
                <h4 class="font-bold text-naruto-text truncate">${guide.title || '未命名攻略'}</h4>
              </div>
              <p class="text-xs text-naruto-muted-text ml-8">${formatDate(guide.date)} · ID: ${guide.id}</p>
            </div>
            <button class="delete-btn flex-shrink-0 px-3 py-1.5 border border-naruto-red/40 text-naruto-red rounded-md text-xs hover:bg-naruto-red/10 transition-colors flex items-center gap-1" data-id="${guide.id}">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              删除
            </button>
          </div>
        </div>
      `;
    }).join('');

    // 绑定删除按钮事件
    els.historyList.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        deleteGuide(id);
      });
    });
  }

  // ========== 文件上传与转换 ==========
  function handleFile(file) {
    if (!file) return;
    
    if (!file.name.endsWith('.docx')) {
      showToast('请上传 .docx 格式的 Word 文档', 'error');
      return;
    }

    currentFile = file;
    els.fileNameText.textContent = file.name;
    els.fileName.classList.remove('hidden');
    els.previewSection.classList.remove('hidden');
    els.previewContent.innerHTML = '<p class="text-naruto-muted-text">正在转换文档，请稍候...</p>';
    els.publishBtn.disabled = true;

    const reader = new FileReader();
    reader.onload = function(e) {
      const arrayBuffer = e.target.result;
      
      mammoth.convertToHtml({ arrayBuffer: arrayBuffer })
        .then(function(result) {
          currentHtml = result.value;
          els.previewContent.innerHTML = currentHtml;
          els.publishBtn.disabled = false;
          
          if (result.messages.length > 0) {
            console.log('转换警告:', result.messages);
          }
          
          showToast('文档转换成功', 'success');
        })
        .catch(function(err) {
          console.error('转换失败:', err);
          els.previewContent.innerHTML = '<p class="text-naruto-red">文档转换失败，请重试</p>';
          showToast('文档转换失败', 'error');
          els.publishBtn.disabled = true;
        });
    };
    reader.onerror = function() {
      showToast('文件读取失败', 'error');
    };
    reader.readAsArrayBuffer(file);
  }

  // ========== 发布攻略 ==========
  function publishGuide() {
    const title = els.titleInput.value.trim();
    const date = els.dateInput.value || getTodayStr();

    if (!title) {
      showToast('请输入期数标题', 'error');
      return;
    }

    if (!currentHtml) {
      showToast('请先上传 Word 文档', 'error');
      return;
    }

    const guides = loadGuides();

    const newGuide = {
      id: generateId(),
      title: title,
      date: date,
      content: currentHtml,
    };

    // 检查是否有同名的，有则询问覆盖
    const existingIndex = guides.findIndex(g => g.title === title);
    if (existingIndex >= 0) {
      if (!confirm(`「${title}」已存在，是否覆盖？`)) {
        return;
      }
      // 覆盖：保留原ID
      newGuide.id = guides[existingIndex].id;
      guides[existingIndex] = newGuide;
    } else {
      guides.push(newGuide);
    }

    if (!saveGuides(guides)) return;

    // 设置当前查看的为最新发布的
    localStorage.setItem(CURRENT_KEY, newGuide.id);

    // 重置表单
    resetForm();
    
    // 刷新显示
    updateStatus();
    renderHistory();

    // 发布成功后自动下载 data.json
    exportDataJson();
    showToast(`「${title}」发布成功！请将下载的 data.json 上传到 GitHub 仓库根目录`, 'success', 4000);
  }

  // ========== 删除单期 ==========
  function deleteGuide(id) {
    const guides = loadGuides();
    const guide = guides.find(g => g.id === id);
    if (!guide) return;

    if (!confirm(`确定要删除「${guide.title || '未命名攻略'}」吗？此操作不可恢复。`)) {
      return;
    }

    const newGuides = guides.filter(g => g.id !== id);
    saveGuides(newGuides);

    // 如果删除的是当前选中的，清除当前选中
    const currentId = localStorage.getItem(CURRENT_KEY);
    if (currentId === id) {
      localStorage.removeItem(CURRENT_KEY);
    }

    updateStatus();
    renderHistory();
    showToast('删除成功', 'success');
  }

  // ========== 清空全部 ==========
  function clearAll() {
    if (!confirm('确定要清空所有攻略记录吗？此操作不可恢复！')) {
      return;
    }
    if (!confirm('再次确认：真的要删除全部数据吗？')) {
      return;
    }

    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(CURRENT_KEY);

    updateStatus();
    renderHistory();
    showToast('已清空全部记录', 'info');
  }

  // ========== 重置表单 ==========
  function resetForm() {
    currentHtml = '';
    currentFile = null;
    els.titleInput.value = '';
    els.dateInput.value = getTodayStr();
    els.fileInput.value = '';
    els.fileName.classList.add('hidden');
    els.previewSection.classList.add('hidden');
    els.previewContent.innerHTML = '';
    els.publishBtn.disabled = true;
  }

  // ========== 事件绑定 ==========
  function bindEvents() {
    // 发布按钮
    els.publishBtn.addEventListener('click', publishGuide);

    // 重置按钮
    els.resetBtn.addEventListener('click', resetForm);

    // 导出按钮
    els.exportBtn.addEventListener('click', exportDataJson);

    // 导入按钮
    els.importBtn.addEventListener('click', () => {
      els.importFileInput.click();
    });

    els.importFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      importDataJson(file);
      // 重置 input 以便可以再次选择同一个文件
      els.importFileInput.value = '';
    });

    // 清空全部
    els.clearAllBtn.addEventListener('click', clearAll);

    // 拖拽上传
    els.dropZone.addEventListener('click', () => {
      els.fileInput.click();
    });

    els.fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      handleFile(file);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
      els.dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        els.dropZone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      els.dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        els.dropZone.classList.remove('dragover');
      });
    });

    els.dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });
  }

  // ========== 初始化 ==========
  function init() {
    bindEvents();
    
    // 设置默认日期为今天
    els.dateInput.value = getTodayStr();
    
    updateStatus();
    renderHistory();
  }

  // 启动
  init();
})();
</script>
</body>
</html>
