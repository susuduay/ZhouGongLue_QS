<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火影战力周攻略</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'naruto-bg': '#0f0a05',
        'naruto-card': '#1c1208',
        'naruto-border': '#4a3015',
        'naruto-text': '#fef3c7',
        'naruto-orange': '#f97316',
        'naruto-orange-dark': '#ea580c',
        'naruto-gold': '#fbbf24',
        'naruto-muted': '#2a1a0a',
        'naruto-muted-text': '#d4a373',
      },
      fontFamily: {
        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
      },
      boxShadow: {
        'naruto-glow': '0 0 20px rgba(249, 115, 22, 0.3), 0 0 40px rgba(249, 115, 22, 0.1)',
        'naruto-glow-strong': '0 0 30px rgba(249, 115, 22, 0.5), 0 0 60px rgba(249, 115, 22, 0.2)',
      },
    },
  },
}
</script>
<style>
  /* 自定义滚动条 */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #2a1a0a;
  }
  ::-webkit-scrollbar-thumb {
    background: #c2410c;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #f97316;
  }

  /* 火影风格渐变文字 */
  .gradient-text {
    background: linear-gradient(135deg, #f97316, #fbbf24, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 忍者风格分隔线 */
  .ninja-divider {
    position: relative;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f97316, #fbbf24, #f97316, transparent);
  }
  .ninja-divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 12px;
    height: 12px;
    background: #f97316;
    box-shadow: 0 0 10px rgba(249, 115, 22, 0.8);
  }

  /* 木叶标志 SVG 样式 */
  .leaf-icon {
    filter: drop-shadow(0 0 4px rgba(249, 115, 22, 0.6));
  }

  /* 内容区富文本样式 */
  .guide-content {
    line-height: 1.8;
  }
  .guide-content h1,
  .guide-content h2,
  .guide-content h3,
  .guide-content h4 {
    color: #fbbf24;
    font-weight: bold;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }
  .guide-content h1 { font-size: 1.75rem; }
  .guide-content h2 { font-size: 1.5rem; }
  .guide-content h3 { font-size: 1.25rem; }
  .guide-content h4 { font-size: 1.1rem; }
  .guide-content p {
    margin-bottom: 1rem;
    color: #fef3c7;
  }
  .guide-content ul,
  .guide-content ol {
    margin-bottom: 1rem;
    padding-left: 1.5rem;
    color: #fef3c7;
  }
  .guide-content li {
    margin-bottom: 0.5rem;
  }
  .guide-content ul li::marker {
    color: #f97316;
  }
  .guide-content ol li::marker {
    color: #fbbf24;
    font-weight: bold;
  }
  .guide-content strong,
  .guide-content b {
    color: #fbbf24;
    font-weight: bold;
  }
  .guide-content em,
  .guide-content i {
    color: #f97316;
    font-style: italic;
  }
  .guide-content a {
    color: #f97316;
    text-decoration: underline;
  }
  .guide-content a:hover {
    color: #fbbf24;
  }
  .guide-content blockquote {
    border-left: 4px solid #f97316;
    padding-left: 1rem;
    margin: 1rem 0;
    background: rgba(249, 115, 22, 0.1);
    padding: 0.75rem 1rem;
    color: #fef3c7;
    border-radius: 0 0.5rem 0.5rem 0;
  }
  .guide-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    background: #1c1208;
  }
  .guide-content th,
  .guide-content td {
    border: 1px solid #4a3015;
    padding: 0.5rem 0.75rem;
    text-align: left;
  }
  .guide-content th {
    background: #4a3015;
    color: #fbbf24;
    font-weight: bold;
  }
  .guide-content tr:nth-child(even) {
    background: rgba(74, 48, 21, 0.3);
  }
  .guide-content img {
    max-width: 100%;
    border-radius: 0.5rem;
    margin: 1rem 0;
    border: 1px solid #4a3015;
  }
  .guide-content hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #4a3015, transparent);
    margin: 1.5rem 0;
  }
  .guide-content code {
    background: #2a1a0a;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    color: #fbbf24;
    font-family: monospace;
  }
  .guide-content pre {
    background: #2a1a0a;
    padding: 1rem;
    border-radius: 0.5rem;
    overflow-x: auto;
    border: 1px solid #4a3015;
    margin: 1rem 0;
  }
  .guide-content pre code {
    background: none;
    padding: 0;
  }

  /* 卡片发光边框 */
  .card-glow {
    position: relative;
    border: 1px solid #4a3015;
    background: #1c1208;
  }
  .card-glow::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, #f97316, #fbbf24, #f97316);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    pointer-events: none;
  }

  /* 历史记录项悬停效果 */
  .history-item {
    transition: all 0.2s ease;
  }
  .history-item:hover {
    transform: translateX(4px);
    border-color: #f97316;
  }
  .history-item.active {
    border-color: #fbbf24;
    background: rgba(251, 191, 36, 0.08);
  }

  /* 旋转动画 */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>

<script>
(function() {
  'use strict';

  // ========== 数据存储 ==========
  const STORAGE_KEY = 'naruto_guides';
  const CURRENT_KEY = 'naruto_guides_current';

  // 缓存的攻略数据
  let guidesCache = null;
  let dataSource = 'local'; // 'json' 或 'local'
  let loadStatus = 'loading'; // 'loading' | 'success' | 'failed'
  let loadError = null; // 记录加载错误信息
  let lastTriedPath = 'data.json'; // 最后尝试的加载路径

  // 从 localStorage 加载（fallback）
  function loadGuidesFromLocal() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) {
      console.error('加载本地攻略数据失败:', e);
      return [];
    }
  }

  // 尝试从指定路径加载 data.json
  async function tryFetchJson(path) {
    const timestamp = Date.now();
    const url = `${path}?t=${timestamp}`;
    lastTriedPath = path;
    try {
      const response = await fetch(url, { cache: 'no-store' });
      if (response.ok) {
        const data = await response.json();
        if (Array.isArray(data) && data.length > 0) {
          return data;
        }
      }
      return null;
    } catch (e) {
      console.log(`加载 ${path} 失败:`, e);
      return null;
    }
  }

  // 优先从 data.json 加载，失败则 fallback 到 localStorage
  async function loadGuides(force = false) {
    if (guidesCache !== null && !force) {
      return guidesCache;
    }

    loadStatus = 'loading';
    loadError = null;
    updateDataSourceBadge('loading');

    // 尝试多个路径
    const paths = ['./data.json', 'data.json'];
    for (const path of paths) {
      const data = await tryFetchJson(path);
      if (data) {
        guidesCache = data;
        dataSource = 'json';
        loadStatus = 'success';
        updateDataSourceBadge('success');
        return guidesCache;
      }
    }

    // data.json 加载失败，尝试 fallback 到 localStorage
    const localData = loadGuidesFromLocal();
    if (localData.length > 0) {
      guidesCache = localData;
      dataSource = 'local';
      loadStatus = 'success';
      updateDataSourceBadge('local');
      return guidesCache;
    }

    // 完全没有数据
    guidesCache = [];
    dataSource = 'none';
    loadStatus = 'failed';
    loadError = '无法从 data.json 和本地存储加载数据';
    updateDataSourceBadge('failed');
    return guidesCache;
  }

  // 强制刷新缓存（重新加载）
  async function reloadGuides(force = false) {
    guidesCache = null;
    return loadGuides(force);
  }

  // ========== 数据源状态标签更新 ==========
  function updateDataSourceBadge(status) {
    const dot = document.getElementById('dataSourceDot');
    const text = document.getElementById('dataSourceText');
    if (!dot || !text) return;

    // 移除所有状态颜色类
    dot.className = 'w-2 h-2 rounded-full';

    switch (status) {
      case 'loading':
        dot.classList.add('bg-gray-500');
        text.textContent = '加载中...';
        text.className = 'text-xs text-gray-400';
        break;
      case 'success':
        dot.classList.add('bg-green-500');
        dot.classList.add('shadow-[0_0_6px_rgba(34,197,94,0.6)]');
        text.textContent = '在线数据';
        text.className = 'text-xs text-green-400';
        break;
      case 'local':
        dot.classList.add('bg-orange-500');
        dot.classList.add('shadow-[0_0_6px_rgba(249,115,22,0.6)]');
        text.textContent = '本地数据';
        text.className = 'text-xs text-naruto-orange';
        break;
      case 'failed':
        dot.classList.add('bg-red-500');
        dot.classList.add('shadow-[0_0_6px_rgba(239,68,68,0.6)]');
        text.textContent = '加载失败';
        text.className = 'text-xs text-red-400';
        break;
      default:
        dot.classList.add('bg-gray-500');
        text.textContent = '加载中...';
        text.className = 'text-xs text-gray-400';
    }

    // 更新空状态的路径显示
    const pathEl = document.getElementById('emptyDataPath');
    if (pathEl) {
      pathEl.textContent = `尝试加载路径：${lastTriedPath}`;
    }
  }

  function getCurrentGuideId() {
    return localStorage.getItem(CURRENT_KEY) || null;
  }

  function setCurrentGuideId(id) {
    localStorage.setItem(CURRENT_KEY, id);
  }

  // ========== DOM 元素 ==========
  const els = {
    heroTitle: document.getElementById('heroTitle'),
    heroDate: document.getElementById('heroDate'),
    contentTitle: document.getElementById('contentTitle'),
    emptyState: document.getElementById('emptyState'),
    guideContent: document.getElementById('guideContent'),
    historyList: document.getElementById('historyList'),
    historyEmpty: document.getElementById('historyEmpty'),
    refreshBtn: document.getElementById('refreshBtn'),
    refreshIcon: document.getElementById('refreshIcon'),
    emptyRefreshBtn: document.getElementById('emptyRefreshBtn'),
  };

  // ========== 刷新按钮旋转动画 ==========
  let isRefreshing = false;
  function setRefreshing(refreshing) {
    isRefreshing = refreshing;
    if (els.refreshIcon) {
      if (refreshing) {
        els.refreshIcon.style.transition = 'transform 0.3s ease';
        els.refreshIcon.style.animation = 'spin 1s linear infinite';
      } else {
        els.refreshIcon.style.animation = '';
      }
    }
  }

  // ========== 处理刷新操作 ==========
  async function handleRefresh() {
    if (isRefreshing) return;
    setRefreshing(true);

    try {
      const guides = await reloadGuides(true);
      const currentId = getCurrentGuideId();

      if (guides.length > 0) {
        let currentGuide = null;
        if (currentId) {
          currentGuide = guides.find(g => g.id === currentId);
        }
        if (!currentGuide) {
          currentGuide = guides[guides.length - 1];
          setCurrentGuideId(currentGuide.id);
        }
        renderGuide(currentGuide);
      } else {
        renderGuide(null);
      }

      await renderHistory();
    } catch (e) {
      console.error('刷新失败:', e);
    } finally {
      setRefreshing(false);
    }
  }

  // ========== 格式化日期 ==========
  function formatDate(dateStr) {
    if (!dateStr) return '--';
    const date = new Date(dateStr);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}年${month}月${day}日`;
  }

  // ========== 渲染攻略内容 ==========
  function renderGuide(guide) {
    if (!guide) {
      els.emptyState.classList.remove('hidden');
      els.guideContent.classList.add('hidden');
      els.heroTitle.textContent = '第 -- 期 战力周攻略';
      els.heroDate.textContent = '更新时间：--';
      els.contentTitle.textContent = '攻略详情';
      return;
    }

    els.emptyState.classList.add('hidden');
    els.guideContent.classList.remove('hidden');
    
    // 渲染内容
    els.guideContent.innerHTML = guide.content;
    
    // 更新 Hero
    els.heroTitle.textContent = guide.title || '战力周攻略';
    els.heroDate.textContent = `更新时间：${formatDate(guide.date)}`;
    els.contentTitle.textContent = guide.title || '攻略详情';
  }

  // ========== 渲染历史记录 ==========
  async function renderHistory() {
    const guides = await loadGuides();
    const currentId = getCurrentGuideId();

    if (guides.length === 0) {
      els.historyList.innerHTML = '';
      els.historyEmpty.classList.remove('hidden');
      return;
    }

    els.historyEmpty.classList.add('hidden');

    // 倒序显示（最新在上面）
    const reversedGuides = [...guides].reverse();

    els.historyList.innerHTML = reversedGuides.map(guide => {
      const isActive = guide.id === currentId;
      return `
        <div class="history-item cursor-pointer p-3 border border-naruto-border rounded-lg ${isActive ? 'active' : ''}" data-id="${guide.id}">
          <div class="flex items-center justify-between mb-1">
            <span class="font-bold text-sm ${isActive ? 'text-naruto-gold' : 'text-naruto-text'}">${guide.title || '未命名攻略'}</span>
            ${isActive ? '<span class="w-2 h-2 rounded-full bg-naruto-gold"></span>' : ''}
          </div>
          <p class="text-xs text-naruto-muted-text">${formatDate(guide.date)}</p>
        </div>
      `;
    }).join('');

    // 绑定点击事件
    els.historyList.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', () => {
        const id = item.dataset.id;
        viewGuide(id);
      });
    });
  }

  // ========== 查看攻略 ==========
  async function viewGuide(id) {
    const guides = await loadGuides();
    const guide = guides.find(g => g.id === id);
    if (guide) {
      setCurrentGuideId(id);
      renderGuide(guide);
      await renderHistory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ========== 初始化 ==========
  async function init() {
    // 绑定刷新按钮事件
    if (els.refreshBtn) {
      els.refreshBtn.addEventListener('click', handleRefresh);
    }
    if (els.emptyRefreshBtn) {
      els.emptyRefreshBtn.addEventListener('click', handleRefresh);
    }

    const guides = await loadGuides();
    const currentId = getCurrentGuideId();
    
    if (guides.length > 0) {
      // 找到当前选中的，或者显示最新一期（数组最后一个）
      let currentGuide = null;
      if (currentId) {
        currentGuide = guides.find(g => g.id === currentId);
      }
      if (!currentGuide) {
        // 最新一期在数组最后
        currentGuide = guides[guides.length - 1];
        setCurrentGuideId(currentGuide.id);
      }
      renderGuide(currentGuide);
    } else {
      renderGuide(null);
    }
    
    await renderHistory();
  }

  // 启动
  init();
})();
</script>
</body>
</html>
